<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Placement Prep – Progress Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #181c27;
    --bg3: #1e2235;
    --card: #1e2235;
    --border: rgba(255,255,255,0.07);
    --text: #e8eaf0;
    --muted: #8891a8;
    --accent: #7c6fff;
    --accent2: #4ecdc4;
    --accent3: #ff6b6b;
    --green: #56d07e;
    --amber: #ffd166;
    --font: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #1a1040 0%, #0f1117 60%);
    border-bottom: 1px solid var(--border);
    padding: 32px 40px 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-left h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, #a78bfa, #67e8f9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-left p { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .header-right {
    font-size: 12px;
    color: var(--muted);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
  }
  .header-right strong { color: var(--text); }

  /* ── Container ── */
  .page { max-width: 1100px; margin: 0 auto; padding: 32px 24px 0; }

  /* ── Summary cards ── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    border-radius: 14px 0 0 14px;
  }
  .stat-card.purple::before { background: #7c6fff; }
  .stat-card.teal::before   { background: #4ecdc4; }
  .stat-card.green::before  { background: #56d07e; }
  .stat-card.amber::before  { background: #ffd166; }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 700; line-height: 1; }
  .stat-sub   { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .stat-card.purple .stat-value { color: #a78bfa; }
  .stat-card.teal .stat-value   { color: #4ecdc4; }
  .stat-card.green .stat-value  { color: #56d07e; }
  .stat-card.amber .stat-value  { color: #ffd166; }

  /* ── Section titles ── */
  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Subject rows ── */
  .subject-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 14px;
    margin-bottom: 32px;
  }
  .subject-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
  }
  .subject-card:hover {
    border-color: rgba(124,111,255,0.4);
    transform: translateY(-2px);
  }
  .subject-card.active { border-color: #7c6fff; }
  .subj-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .subj-name {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 600;
  }
  .subj-icon { font-size: 18px; }
  .subj-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(124,111,255,0.15);
    color: #a78bfa;
  }
  .subj-badge.done { background: rgba(86,208,126,0.15); color: #56d07e; }

  /* Progress bar */
  .prog-track {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 6px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, #7c6fff, #4ecdc4);
    transition: width 0.6s ease;
  }
  .subj-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
  }
  .subj-meta strong { color: var(--text); }

  /* Topic pills */
  .topic-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 12px;
  }
  .pill {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .pill.done {
    background: rgba(86,208,126,0.1);
    border-color: rgba(86,208,126,0.3);
    color: #56d07e;
  }

  /* ── Charts row ── */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 32px;
  }
  @media (max-width: 680px) { .charts-row { grid-template-columns: 1fr; } }
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }
  .chart-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* ── Radar / detail panel ── */
  .detail-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 32px;
  }
  .detail-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  @media (max-width: 600px) { .detail-grid { grid-template-columns: 1fr; } }

  /* Platform badges */
  .plat-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .plat-badge {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .plat-badge .count { color: #4ecdc4; font-weight: 700; }

  /* Loader */
  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 16px;
    color: var(--muted);
    font-size: 14px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: #7c6fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(255,107,107,0.1);
    border: 1px solid rgba(255,107,107,0.3);
    color: #ff6b6b;
    border-radius: 10px;
    padding: 16px 20px;
    font-size: 13px;
    margin: 24px 0;
  }
  .error-msg code { font-family: monospace; background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Placement Preparation Dashboard</h1>
    <p>Tracking progress across DS&A, SQL, DBMS, OS, CN, OOP</p>
  </div>
  <div class="header-right">
    Last updated: <strong id="last-updated">—</strong>
  </div>
</div>

<div class="page" id="app">
  <div class="loader" id="loader">
    <div class="spinner"></div>
    Loading progress data…
  </div>
</div>

<script>
const COLORS = {
  DSA:  '#7c6fff',
  SQL:  '#4ecdc4',
  DBMS: '#ffd166',
  OS:   '#ff6b6b',
  CN:   '#56d07e',
  OOP:  '#f9a8d4',
};

/* ── Fetch data ────────────────────────────────────────────── */
async function loadData() {
  try {
    const r = await fetch('progress_data.json');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch(e) {
    return null;
  }
}

/* ── Demo / fallback data ──────────────────────────────────── */
function demoData() {
  return {
    summary: {
      total_problems: 53,
      total_target: 315,
      overall_pct: 16.8,
      topics_covered: 14,
      topics_total: 53,
      topics_pct: 26.4,
      subjects_started: 2,
      subjects_total: 6,
      last_updated: "demo mode (push to GitHub to see real data)"
    },
    subjects: {
      DSA: { label:"Data Structures & Algorithms", icon:"🧮", total_problems:46, target_problems:150, progress_pct:30.7, topics_total:14, topics_covered:5, topics_covered_list:["Arrays","Strings","Hashing","Sorting","Recursion"], topics_list:["Arrays","Strings","Linked List","Stack","Queue","Trees","Graphs","Hashing","DP","Recursion","Sorting","Searching","Greedy","Backtracking"], platform_breakdown:[{platform:"LeetCode",problems:30},{platform:"HackerRank",problems:16}] },
      SQL: { label:"SQL & Databases", icon:"🗄️", total_problems:7, target_problems:60, progress_pct:11.7, topics_total:9, topics_covered:3, topics_covered_list:["Basic Select","Joins","Aggregation"], topics_list:["Basic Select","Advanced Select","Joins","Aggregation","Subqueries","Window Functions","String Functions","Date Functions","Indexes"], platform_breakdown:[{platform:"LeetCode",problems:4},{platform:"HackerRank",problems:3}] },
      DBMS:{ label:"DBMS Concepts", icon:"💾", total_problems:0, target_problems:30, progress_pct:0, topics_total:8, topics_covered:0, topics_covered_list:[], topics_list:["ER Model","Normalization","Transactions","ACID","Indexing","Concurrency","Recovery","SQL DDL/DML"], platform_breakdown:[] },
      OS:  { label:"Operating Systems", icon:"⚙️", total_problems:0, target_problems:30, progress_pct:0, topics_total:8, topics_covered:0, topics_covered_list:[], topics_list:["Processes","Threads","Scheduling","Deadlock","Memory Management","Paging","File Systems","IPC"], platform_breakdown:[] },
      CN:  { label:"Computer Networks", icon:"🌐", total_problems:0, target_problems:25, progress_pct:0, topics_total:8, topics_covered:0, topics_covered_list:[], topics_list:["OSI Model","TCP/IP","HTTP/HTTPS","DNS","Routing","Subnetting","Sockets","Security"], platform_breakdown:[] },
      OOP: { label:"Object-Oriented Programming", icon:"🏗️", total_problems:0, target_problems:20, progress_pct:0, topics_total:8, topics_covered:0, topics_covered_list:[], topics_list:["Classes & Objects","Inheritance","Polymorphism","Encapsulation","Abstraction","Design Patterns","SOLID Principles","UML"], platform_breakdown:[] },
    }
  };
}

/* ── Render ────────────────────────────────────────────────── */
function render(data, isDemoMode) {
  const { summary, subjects } = data;
  document.getElementById('last-updated').textContent = summary.last_updated;

  const app = document.getElementById('app');
  app.innerHTML = '';

  if (isDemoMode) {
    app.innerHTML += `<div class="error-msg">
      ℹ️ <strong>Demo mode</strong> — <code>progress_data.json</code> not found. 
      Showing sample data. Push your solutions to GitHub to generate real data.
    </div>`;
  }

  /* Summary cards */
  app.innerHTML += `
  <div class="summary-grid">
    <div class="stat-card purple">
      <div class="stat-label">Problems Solved</div>
      <div class="stat-value">${summary.total_problems}</div>
      <div class="stat-sub">of ${summary.total_target} target · ${summary.overall_pct}%</div>
    </div>
    <div class="stat-card teal">
      <div class="stat-label">Concepts Covered</div>
      <div class="stat-value">${summary.topics_covered}</div>
      <div class="stat-sub">of ${summary.topics_total} topics · ${summary.topics_pct}%</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Subjects Active</div>
      <div class="stat-value">${summary.subjects_started}</div>
      <div class="stat-sub">of ${summary.subjects_total} subjects</div>
    </div>
    <div class="stat-card amber">
      <div class="stat-label">Overall Readiness</div>
      <div class="stat-value">${summary.overall_pct}%</div>
      <div class="stat-sub">based on problems + topics</div>
    </div>
  </div>`;

  /* Charts row */
  app.innerHTML += `
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-label">Problems by subject</div>
      <div style="position:relative;height:200px">
        <canvas id="barChart" role="img" aria-label="Bar chart of problems solved per subject"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-label">Completion % by subject</div>
      <div style="position:relative;height:200px">
        <canvas id="radarChart" role="img" aria-label="Radar chart of completion percentage per subject"></canvas>
      </div>
    </div>
  </div>`;

  /* Subject cards */
  app.innerHTML += `<div class="section-title">Subject Breakdown</div>`;
  app.innerHTML += `<div class="subject-grid" id="subject-grid"></div>`;

  const grid = document.getElementById('subject-grid');
  Object.entries(subjects).forEach(([key, v]) => {
    const pct = Math.round(v.progress_pct);
    const badgeClass = pct >= 80 ? 'done' : '';
    const badgeText  = pct >= 80 ? '✓ Done' : `${pct}%`;

    const pills = v.topics_list.map(t => {
      const done = v.topics_covered_list.includes(t);
      return `<span class="pill ${done ? 'done' : ''}">${t}</span>`;
    }).join('');

    const platHtml = v.platform_breakdown.length
      ? `<div class="plat-row">${v.platform_breakdown.map(p =>
          `<div class="plat-badge">
            <span>${p.platform}</span>
            <span class="count">${p.problems}</span>
          </div>`).join('')}</div>`
      : '';

    grid.innerHTML += `
    <div class="subject-card" data-key="${key}">
      <div class="subj-header">
        <div class="subj-name">
          <span class="subj-icon">${v.icon}</span>
          <span>${v.label}</span>
        </div>
        <span class="subj-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="prog-track">
        <div class="prog-fill" style="width:${pct}%"></div>
      </div>
      <div class="subj-meta">
        <span><strong>${v.total_problems}</strong> problems solved</span>
        <span>target: ${v.target_problems}</span>
      </div>
      ${platHtml}
      <div class="topic-pills">${pills}</div>
    </div>`;
  });

  /* Charts */
  buildCharts(subjects);
}

function buildCharts(subjects) {
  const keys   = Object.keys(subjects);
  const labels = keys.map(k => subjects[k].label.split(' & ')[0].split(' ')[0]);
  const colors = keys.map(k => COLORS[k]);

  /* Bar chart */
  new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Solved',
        data: keys.map(k => subjects[k].total_problems),
        backgroundColor: colors.map(c => c + 'cc'),
        borderColor: colors,
        borderWidth: 1.5,
        borderRadius: 5,
      },{
        label: 'Remaining',
        data: keys.map(k => subjects[k].target_problems - subjects[k].total_problems),
        backgroundColor: 'rgba(255,255,255,0.04)',
        borderColor: 'rgba(255,255,255,0.1)',
        borderWidth: 1,
        borderRadius: 5,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ctx.dataset.label + ': ' + ctx.raw
          }
        }
      },
      scales: {
        x: { stacked: true, ticks: { color: '#8891a8', font: { size: 11 } }, grid: { display: false } },
        y: { stacked: true, ticks: { color: '#8891a8', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.04)' } }
      }
    }
  });

  /* Radar chart */
  new Chart(document.getElementById('radarChart'), {
    type: 'radar',
    data: {
      labels: keys.map(k => subjects[k].label.split('&')[0].trim()),
      datasets: [{
        label: 'Completion %',
        data: keys.map(k => subjects[k].progress_pct),
        borderColor: '#7c6fff',
        backgroundColor: 'rgba(124,111,255,0.15)',
        borderWidth: 2,
        pointBackgroundColor: colors,
        pointRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        r: {
          min: 0, max: 100,
          ticks: { color: '#8891a8', font: { size: 9 }, backdropColor: 'transparent', stepSize: 25 },
          grid: { color: 'rgba(255,255,255,0.06)' },
          pointLabels: { color: '#8891a8', font: { size: 10 } },
          angleLines: { color: 'rgba(255,255,255,0.06)' }
        }
      }
    }
  });
}

/* ── Boot ──────────────────────────────────────────────────── */
(async () => {
  const data = await loadData();
  document.getElementById('loader').remove();
  if (data) {
    render(data, false);
  } else {
    render(demoData(), true);
  }
})();
</script>
</body>
</html>
